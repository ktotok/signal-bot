services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      - MODE=json-rpc          # required: only this mode exposes the receive WebSocket
    ports:
      - "8080:8080"
    volumes:
      - ./signal-cli-config:/home/.local/share/signal-cli   # persists the device link
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      - signal-api
    env_file: .env
    environment:
      - SIGNAL_SERVICE=signal-api:8080
    restart: unless-stopped
